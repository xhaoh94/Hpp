<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Hpp H plus plus D variants</title>
  <desc id="desc">Six app icon refinements where a shared crossbar forms an H and two plus symbols.</desc>
  <rect width="1200" height="680" fill="#151719"/>

  <!-- D1: clean shared bridge -->
  <g transform="translate(55 35)">
    <rect width="260" height="260" rx="64" fill="#202124" stroke="#3C4047" stroke-width="4"/>
    <rect x="66" y="51" width="38" height="158" rx="19" fill="#4A9EFF"/>
    <rect x="156" y="51" width="38" height="158" rx="19" fill="#4A9EFF"/>
    <rect x="42" y="111" width="176" height="38" rx="19" fill="#34C78F"/>
  </g>

  <!-- D2: forward italic -->
  <g transform="translate(470 35)">
    <rect width="260" height="260" rx="64" fill="#202124" stroke="#3C4047" stroke-width="4"/>
    <g transform="translate(130 130) skewX(-13) translate(-130 -130)">
      <rect x="67" y="51" width="38" height="158" rx="19" fill="#4A9EFF"/>
      <rect x="155" y="51" width="38" height="158" rx="19" fill="#4A9EFF"/>
      <rect x="43" y="111" width="174" height="38" rx="19" fill="#34C78F"/>
    </g>
  </g>

  <!-- D3: rotated monogram -->
  <g transform="translate(885 35)">
    <rect width="260" height="260" rx="64" fill="#202124" stroke="#3C4047" stroke-width="4"/>
    <g transform="rotate(-10 130 130)">
      <rect x="67" y="51" width="38" height="158" rx="19" fill="#4A9EFF"/>
      <rect x="155" y="51" width="38" height="158" rx="19" fill="#4A9EFF"/>
      <rect x="43" y="111" width="174" height="38" rx="19" fill="#34C78F"/>
    </g>
  </g>

  <!-- D4: blue bridge with green plus pillars -->
  <g transform="translate(55 360)">
    <rect width="260" height="260" rx="64" fill="#202124" stroke="#3C4047" stroke-width="4"/>
    <rect x="66" y="51" width="38" height="158" rx="19" fill="#34C78F"/>
    <rect x="156" y="51" width="38" height="158" rx="19" fill="#34C78F"/>
    <rect x="42" y="111" width="176" height="38" rx="19" fill="#4A9EFF"/>
  </g>

  <!-- D5: emphasized plus intersections -->
  <g transform="translate(470 360)">
    <rect width="260" height="260" rx="64" fill="#202124" stroke="#3C4047" stroke-width="4"/>
    <rect x="66" y="51" width="38" height="158" rx="19" fill="#4A9EFF"/>
    <rect x="156" y="51" width="38" height="158" rx="19" fill="#4A9EFF"/>
    <rect x="42" y="111" width="176" height="38" rx="19" fill="#34C78F"/>
    <rect x="66" y="111" width="38" height="38" rx="11" fill="#71DEB6"/>
    <rect x="156" y="111" width="38" height="38" rx="11" fill="#71DEB6"/>
  </g>

  <!-- D6: compact angled H++ -->
  <g transform="translate(885 360)">
    <rect width="260" height="260" rx="64" fill="#202124" stroke="#3C4047" stroke-width="4"/>
    <g transform="rotate(-7 130 130)">
      <path d="M74 52h38L96 208H58z" fill="#4A9EFF"/>
      <path d="M164 52h38l-16 156h-38z" fill="#4A9EFF"/>
      <path d="M42 109h176l-4 40H38z" fill="#34C78F"/>
    </g>
  </g>

  <g fill="#A3A3A3" font-family="Inter, Segoe UI, sans-serif" font-size="18" font-weight="650" text-anchor="middle">
    <text x="185" y="326">D1</text>
    <text x="600" y="326">D2</text>
    <text x="1015" y="326">D3</text>
    <text x="185" y="651">D4</text>
    <text x="600" y="651">D5</text>
    <text x="1015" y="651">D6</text>
  </g>
</svg>
